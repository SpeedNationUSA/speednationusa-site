<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeedNationUSA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(circle at center, #1a1a1a, #000);
    }

    .hero h1 {
      font-size: 56px;
      margin: 0;
      letter-spacing: 2px;
    }

    .hero p {
      opacity: 0.8;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 22px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
    }

    /* SECTION */
    section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    /* CONTACT */
    .contact {
      text-align: center;
      background: #111;
      padding: 60px 20px;
    }

    .contact p {
      margin: 8px 0;
      opacity: 0.8;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>SpeedNationUSA</h1>
    <p>Automotive Photography • Event Coverage • Car Culture Media</p>
    <a class="btn" href="#contact">Book a Shoot</a>
  </div>

  <!-- GALLERY -->
  <section>
    <h2>Featured Work</h2>

    <div class="gallery">
      <!-- Replace these with your real images -->
      <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7" />
      <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" />
      <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" />
      <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c" />
      <img src="https://images.unsplash.com/photo-1542362567-b07e54358753" />
      <img src="https://images.unsplash.com/photo-1493238792000-8113da705763" />
    </div>
  </section>

  <!-- CONTACT -->
  <div id="contact" class="contact">
    <h2>Contact / Bookings</h2>
   <div style="margin-top:15px;">
  <a href="https://instagram.com/speednationusa" target="_blank" style="
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:14px 22px;
    background:#111;
    border:1px solid #E1306C;
    color:white;
    text-decoration:none;
    font-weight:bold;
    border-radius:8px;
  ">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"
         style="width:20px;height:20px;">
    View Instagram Portfolio
  </a>
</div>
    <p>Email: speednationusa@gmail.com</p>
    <p>Based in Florida • Available for shoots & events</p>
  </div>

  <footer>
    © 2026 SpeedNationUSA. All rights reserved.
  </footer>

</body>
</html>
